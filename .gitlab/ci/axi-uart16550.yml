check-uart16550:
  stage: stage1
  script:
    - cd axi-uart16550
    - cargo check

format-uart16550:
  stage: stage1
  script:
    - rustup component add rustfmt
    - cd axi-uart16550
    - cargo fmt --all -- --check

clippy-uart16550:
  stage: stage1
  script:
    - rustup component add clippy
    - cd axi-uart16550
    - cargo clippy -- -D warnings

docs-uart16550:
  stage: stage1
  before_script:
    - rustup install nightly
  script:
    - cd axi-uart16550
    - RUSTDOCFLAGS="--cfg docsrs -Z unstable-options --generate-link-to-definition" cargo +nightly doc --no-deps

cross-check-armv7-linux-uart16550:
  extends: .rust_setup_cross_compilation
  stage: stage2
  script:
    - cd axi-uart16550
    - cargo build --target armv7-unknown-linux-gnueabihf

cross-check-armv7-embedded-uart16550:
  extends: .rust_setup_cross_compilation
  stage: stage2
  script:
    - cd axi-uart16550
    - cargo build --target armv7a-none-eabihf
